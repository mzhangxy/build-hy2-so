name: Build Hysteria2 SO

on:
  workflow_dispatch: # 允许手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4 

    - name: Set up Go
      uses: actions/setup-go@v5 
      with:
        go-version: '1.22'

    - name: Initialize and Compile
      run: |
        # 1. 初始化 Go 模块
        go mod init hy2so
        
        # 2. 拉取 Hysteria 2 官方源码依赖 (包含 Realms 功能的最新版)
        go get github.com/apernet/hysteria/app/cmd@latest
        go mod tidy
        
        # 3. 开启 CGO，编译为 Linux amd64 架构的共享库 (.so)
        CGO_ENABLED=1 GOOS=linux GOARCH=amd64 go build -buildmode=c-shared -ldflags="-w -s" -o hy2-amd64.so main.go

    - name: Upload SO File
      uses: actions/upload-artifact@v4 # 【核心修复点】升级为 v4
      with:
        name: hy2-so-linux-amd64
        path: hy2-amd64.so
